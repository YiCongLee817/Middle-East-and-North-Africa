<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中東與北非地理配對遊戲</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@700&display=swap');
:root{
  --deep:#0d0a04;--parchment:#f0ddb8;--amber:#d4870a;--sand:#c8a96e;
  --correct:#28a028;--wrong:#c02020;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--deep);color:var(--parchment);font-family:'Noto Serif TC',serif}

/* ── LAYOUT: full-page two-column ── */
#app{
  display:grid;
  grid-template-columns:1fr 300px;
  grid-template-rows:auto 1fr;
  grid-template-areas:
    "topbar  topbar"
    "map     sidebar";
  height:100vh;
  min-height:600px;
}

/* ── TOP BAR ── */
#topbar{
  grid-area:topbar;
  background:rgba(10,7,2,.95);
  border-bottom:1px solid rgba(200,169,110,.15);
  padding:8px 16px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
#topbar h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(.95rem,1.8vw,1.35rem);
  color:var(--sand);letter-spacing:.08em;
  text-shadow:0 1px 8px rgba(200,169,110,.4);
  white-space:nowrap;
}
#legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.leg{display:flex;align-items:center;gap:3px;font-size:.62rem;color:#c0a878}
.leg-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0}
#cat-filter{display:flex;flex-wrap:wrap;gap:4px;margin-left:auto}
.cf{font-family:'Noto Serif TC',serif;font-size:.6rem;padding:2px 10px;border-radius:11px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;background:rgba(255,255,255,.04);color:#b0906a;white-space:nowrap}
.cf.on{font-weight:700;filter:brightness(1.45)}

/* ── MAP PANEL ── */
#map-panel{
  grid-area:map;
  position:relative;overflow:hidden;
  background:#0a0704;
}
#map-img{
  width:100%;height:100%;
  object-fit:contain;object-position:center;
  display:block;
}
#map-inner{position:absolute;inset:0}

/* ── DOT ── */
.adot{
  position:absolute;width:13px;height:13px;border-radius:50%;
  border:2px solid rgba(255,255,255,.8);
  transform:translate(-50%,-50%);z-index:6;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
}
.adot:hover{transform:translate(-50%,-50%) scale(1.8);box-shadow:0 0 10px currentColor}
.adot.active{transform:translate(-50%,-50%) scale(2.1);outline:2px solid #fff;outline-offset:2px}
.adot-label{
  position:absolute;font-size:.48rem;white-space:nowrap;
  transform:translate(-50%,65%);z-index:7;pointer-events:none;
  text-shadow:0 0 4px rgba(0,0,0,1),0 0 8px rgba(0,0,0,.9);
  font-weight:700;
}

/* ── SIDEBAR ── */
#sidebar{
  grid-area:sidebar;
  background:rgba(14,10,4,.97);
  border-left:1px solid rgba(200,169,110,.12);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* score strip */
#score-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;
  background:rgba(20,14,6,.98);
  border-bottom:1px solid rgba(200,169,110,.1);
  flex-wrap:wrap;gap:4px;
}
.si{font-size:.62rem;color:#907050;white-space:nowrap} .si span{color:var(--sand);font-weight:700}
.btn{background:var(--amber);color:var(--deep);border:none;font-family:'Noto Serif TC',serif;font-size:.62rem;font-weight:700;padding:4px 10px;border-radius:4px;cursor:pointer;white-space:nowrap}
.btn:hover{opacity:.8}
.btn.sec{background:transparent;color:var(--sand);border:1px solid rgba(200,169,110,.35)}

/* hint */
#hint{
  padding:5px 12px;min-height:22px;font-size:.6rem;color:#a08060;
  border-bottom:1px solid rgba(200,169,110,.08);
}
#hint b{color:var(--amber)}

/* word bank scrollable */
#wb-scroll{flex:1;overflow-y:auto;padding:8px 12px}
#wb-scroll::-webkit-scrollbar{width:4px}
#wb-scroll::-webkit-scrollbar-track{background:transparent}
#wb-scroll::-webkit-scrollbar-thumb{background:rgba(200,169,110,.3);border-radius:2px}
.wb-cat-block{margin-bottom:10px}
.wb-cat-title{
  font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  margin-bottom:4px;display:flex;align-items:center;gap:5px;
}
.wb-cat-title::after{content:'';flex:1;height:1px;background:currentColor;opacity:.2}
.wb-chips{display:flex;flex-wrap:wrap;gap:3px}
.wchip{
  font-size:.64rem;padding:2px 8px;border-radius:10px;cursor:pointer;
  transition:all .12s;border:1px solid;background:rgba(255,255,255,.05);
}
.wchip:hover{filter:brightness(1.35);background:rgba(255,255,255,.12)}
.wchip.sel{font-weight:700;outline:1.5px solid rgba(255,255,255,.6);filter:brightness(1.5);background:rgba(255,255,255,.15)}
.wchip.used{opacity:.18;text-decoration:line-through;pointer-events:none}

/* POPUP */
#popup{
  display:none;position:fixed;z-index:200;
  background:#1c1408;border:1.5px solid;border-radius:8px;
  padding:10px 12px;min-width:150px;max-width:230px;
  box-shadow:0 4px 24px rgba(0,0,0,.85);
}
#popup-title{font-size:.65rem;margin-bottom:7px;font-weight:700}
#popup-chips{display:flex;flex-wrap:wrap;gap:4px}
.pchip{font-size:.62rem;padding:2px 8px;border-radius:9px;cursor:pointer;border:1px solid;background:rgba(255,255,255,.06);transition:all .12s}
.pchip:hover{filter:brightness(1.4);background:rgba(255,255,255,.18)}
.pchip.pcurrent{outline:1.5px solid rgba(255,255,255,.5);font-weight:700}
#popup-close{float:right;background:none;border:none;color:#888;cursor:pointer;font-size:.75rem;margin:-2px -2px 0 0}

/* RESULT */
#result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;align-items:center;justify-content:center}
#result-overlay.show{display:flex}
#result-box{background:#160e04;border:2px solid var(--amber);border-radius:9px;padding:24px 32px;text-align:center;max-width:300px}
#result-box h2{color:var(--sand);font-size:1.1rem;margin-bottom:6px}
.rbig{font-size:1.9rem;color:var(--amber);font-weight:700;margin-bottom:6px}
#result-box p{color:#c0aa88;font-size:.72rem;margin-bottom:12px}
</style>
</head>

const CAT_ICON  = {'國家':'🏳️','城市':'🏙️','地形':'⛰️','水域':'🌊','河流':'〰️'};

let answers={}, selChip=null, activeDot=null, currentCat='全部';

window.onload = () => {
  const img = document.getElementById('map-img');
  const init = () => { renderDots(); buildWordBank(); };
  img.complete ? init() : img.addEventListener('load', init);
  window.addEventListener('resize', repositionDots);

  document.querySelectorAll('.cf').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.cf').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); currentCat = b.dataset.cat;
      buildWordBank(); filterDots();
    });
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#popup') && !e.target.closest('.adot') && !e.target.closest('.wchip'))
      closePopup();
  });
};

/* ── DOT POSITIONING ──
   Map image uses object-fit:contain inside #map-panel.
   We need to find the actual rendered rect of the image. */
function getImgRect() {
  const panel = document.getElementById('map-panel');
  const img   = document.getElementById('map-img');
  const pw = panel.clientWidth,  ph = panel.clientHeight;
  const iw = img.naturalWidth,   ih = img.naturalHeight;
  if (!iw || !ih) return {left:0,top:0,width:pw,height:ph};
  const scale = Math.min(pw/iw, ph/ih);
  const rw = iw*scale, rh = ih*scale;
  return {
    left: (pw-rw)/2,
    top:  (ph-rh)/2,
    width: rw,
    height: rh,
  };
}

function renderDots() {
  const inner = document.getElementById('map-inner');
  ITEMS.forEach(item => {
    const dot = document.createElement('div');
    dot.className = 'adot';
    dot.dataset.label = item.label;
    dot.style.background  = item.color;
    dot.style.boxShadow   = '0 0 4px ' + item.color + '99';
    dot.addEventListener('click', e => { e.stopPropagation(); onDotClick(item.label, dot, e); });
    inner.appendChild(dot);
  });
  repositionDots();
}

function repositionDots() {
  const r = getImgRect();
  ITEMS.forEach(item => {
    const dot = document.querySelector('.adot[data-label="' + item.label + '"]');
    if (!dot) return;
    dot.style.left = (r.left + item.mx/100 * r.width)  + 'px';
    dot.style.top  = (r.top  + item.my/100 * r.height) + 'px';
  });
}

function filterDots() {
  ITEMS.forEach(item => {
    const show = currentCat==='全部' || item.cat===currentCat;
    const dot  = document.querySelector('.adot[data-label="' + item.label + '"]');
    if (dot) dot.style.opacity = show ? '1' : '0.07';
  });
}

/* ── WORD BANK ── */
function buildWordBank() {
  const wb = document.getElementById('wb');
  wb.innerHTML = '';
  const usedVals = new Set(Object.values(answers));
  const catsToShow = currentCat==='全部' ? CAT_ORDER : [currentCat];
  catsToShow.forEach(cat => {
    const labels = CATS[cat]||[];
    const col    = CAT_COLOR[cat];
    const block  = document.createElement('div'); block.className='wb-cat-block';
    const title  = document.createElement('div'); title.className='wb-cat-title';
    title.style.color = col;
    title.textContent = CAT_ICON[cat]+' '+cat+'（'+labels.length+'）';
    block.appendChild(title);
    const chips = document.createElement('div'); chips.className='wb-chips';
    [...labels].sort(()=>Math.random()-.5).forEach(label => {
      const c = document.createElement('span');
      c.className='wchip'+(usedVals.has(label)?' used':'');
      c.textContent=label; c.dataset.value=label;
      c.style.color=col; c.style.borderColor=col+'55'; c.style.background=col+'0f';
      c.addEventListener('click', e=>{ e.stopPropagation(); onChipClick(c); });
      chips.appendChild(c);
    });
    block.appendChild(chips); wb.appendChild(block);
  });
}

function getCat(label){
  for(const [c,arr] of Object.entries(CATS)) if(arr.includes(label)) return c;
  return '國家';
}

/* ── INTERACTIONS ── */
function onChipClick(chip) {
  if(chip.classList.contains('used')) return;
  if(selChip===chip){ clearSel(); updateHint(); return; }
  if(selChip) selChip.classList.remove('sel');
  selChip=chip; chip.classList.add('sel'); updateHint();
  if(activeDot){ assignAnswer(activeDot.dataset.label,chip.dataset.value); clearSel(); clearActive(); }
}

function onDotClick(label,dot,e) {
  if(selChip){ assignAnswer(label,selChip.dataset.value); clearSel(); clearActive(); updateHint(); return; }
  setActive(dot); openPopup(label,dot,e);
}

function setActive(dot)  { clearActive(); activeDot=dot; dot.classList.add('active'); }
function clearActive()   { if(activeDot){ activeDot.classList.remove('active'); activeDot=null; } }
function clearSel()      { if(selChip) selChip.classList.remove('sel'); selChip=null; }
function updateHint()    {
  document.getElementById('hint').innerHTML = selChip
    ? '已選「<b>'+selChip.dataset.value+'</b>」— 點圓點填入' : '';
}

/* ── POPUP ── */
function openPopup(label,dot,e) {
  const popup=document.getElementById('popup');
  const item=ITEMS.find(i=>i.label===label);
  popup.style.borderColor=item.color;
  document.getElementById('popup-title').style.color=item.color;
  document.getElementById('popup-title').textContent='選擇答案（'+item.cat+'）：';
  const pchips=document.getElementById('popup-chips'); pchips.innerHTML='';
  const usedVals=new Set(Object.values(answers));
  const current=answers[label];
  (CATS[item.cat]||[]).forEach(l=>{
    if(usedVals.has(l)&&l!==current) return;
    const c=document.createElement('span');
    c.className='pchip'+(current===l?' pcurrent':'');
    c.textContent=l; c.style.color=item.color; c.style.borderColor=item.color+'55';
    c.addEventListener('click',()=>{ assignAnswer(label,l); closePopup(); clearActive(); });
    pchips.appendChild(c);
  });
  popup.style.display='block';
  let left=e.clientX+12, top=e.clientY+12;
  if(left+240>window.innerWidth)  left=e.clientX-248;
  if(top +220>window.innerHeight) top =e.clientY-220;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
function closePopup(){ document.getElementById('popup').style.display='none'; clearActive(); }

/* ── ASSIGN ── */
function assignAnswer(label,value) {
  Object.keys(answers).forEach(k=>{ if(answers[k]===value&&k!==label) delete answers[k]; });
  answers[label]=value;
  const dot=document.querySelector('.adot[data-label="'+label+'"]');
  if(dot){
    dot.classList.add('answered'); dot.classList.remove('correct-dot','wrong-dot');
    let lbl=dot.querySelector('.adot-label');
    if(!lbl){ lbl=document.createElement('div'); lbl.className='adot-label'; dot.appendChild(lbl); }
    lbl.textContent=value; lbl.style.color=dot.style.background;
  }
  refreshChips();
  document.getElementById('s-done').textContent=Object.keys(answers).length;
}
function refreshChips(){
  const usedVals=new Set(Object.values(answers));
  document.querySelectorAll('.wchip').forEach(c=>{
    c.classList.toggle('used',usedVals.has(c.dataset.value));
    if(c.classList.contains('sel')&&usedVals.has(c.dataset.value)){ c.classList.remove('sel'); selChip=null; updateHint(); }
  });
}

/* ── CHECK ── */
function checkAll(){
  let ok=0,bad=0,empty=0;
  ITEMS.forEach(item=>{
    const dot=document.querySelector('.adot[data-label="'+item.label+'"]');
    dot.classList.remove('correct-dot','wrong-dot');
    const lbl=dot.querySelector('.adot-label');
    const val=answers[item.label]||'';
    if(!val){ empty++; if(lbl) lbl.style.color=dot.style.background; }
    else if(val===item.label){ ok++; dot.classList.add('correct-dot'); if(lbl) lbl.style.color='#afffaf'; }
    else{ bad++; dot.classList.add('wrong-dot'); if(lbl) lbl.style.color='#ffaaaa'; }
  });
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-empty').textContent=empty;
  if(ok===ITEMS.length) showResult(ok,ITEMS.length);
}
function showResult(ok,tot){
  const pct=Math.round(ok/tot*100);
  document.getElementById('r-score').textContent=ok+' / '+tot+' ('+pct+'%)';
  const msg=pct===100?'🏆 完美！你是中東地理達人！':pct>=80?'🌟 非常棒！差一點就滿分！':pct>=60?'👍 不錯！繼續加油！':'📚 多練習，你一定能進步！';
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('result-overlay').classList.add('show');
}
function resetAll(){
  answers={};
  document.querySelectorAll('.adot').forEach(dot=>{
    dot.classList.remove('answered','correct-dot','wrong-dot','active');
    const lbl=dot.querySelector('.adot-label'); if(lbl) lbl.remove();
  });
  ['s-done','s-ok','s-bad','s-empty'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('result-overlay').classList.remove('show');
  buildWordBank(); clearSel(); clearActive(); closePopup();
  document.getElementById('hint').innerHTML='';
}
</script>
</body>
</html>
