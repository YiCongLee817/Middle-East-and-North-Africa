<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中東與北非地理配對遊戲 Responsive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@600;700&display=swap');

:root{
  --deep:#0d0a04;
  --deep-2:#140d05;
  --parchment:#f0ddb8;
  --amber:#d4870a;
  --sand:#c8a96e;
  --correct:#28a028;
  --wrong:#c02020;
  --panel:rgba(18,13,5,.94);
  --line:rgba(200,169,110,.16);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  background:
    radial-gradient(circle at top left, rgba(212,135,10,.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(200,169,110,.08), transparent 30%),
    linear-gradient(180deg, #0c0803 0%, #090603 100%);
  color:var(--parchment);
  font-family:'Noto Serif TC',serif;
}
body{overflow:auto}
button{font:inherit}

#intro{
  position:fixed;inset:0;z-index:500;
  background:radial-gradient(ellipse at 40% 35%, #1b1207 0%, #0a0703 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  overflow:auto;
}
#intro-box{
  width:min(880px,100%);
  border:1px solid rgba(200,169,110,.26);
  border-radius:18px;
  background:rgba(26,16,6,.84);
  padding:clamp(20px,4vw,40px);
  box-shadow:0 20px 70px rgba(0,0,0,.45), 0 0 60px rgba(212,135,10,.12);
}
#intro-box h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.7rem,4vw,2.6rem);
  color:var(--sand);
  text-align:center;
  letter-spacing:.06em;
  margin-bottom:8px;
}
#intro-box .subtitle{
  text-align:center;
  color:#a88a65;
  font-size:clamp(.9rem,2vw,1rem);
  margin-bottom:24px;
}
.intro-section{margin-bottom:22px}
.intro-section h2{
  font-size:1.05rem;
  color:var(--amber);
  border-left:3px solid var(--amber);
  padding-left:10px;
  margin-bottom:12px;
}
.intro-steps{display:grid;gap:12px}
.step{
  display:flex;gap:12px;align-items:flex-start;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
}
.step-num{
  width:30px;height:30px;flex:0 0 30px;
  border-radius:50%;
  background:var(--amber);
  color:var(--deep);
  display:grid;place-items:center;
  font-weight:900;
}
.step-text{line-height:1.7;font-size:.95rem}
.step-text b{color:var(--amber)}
.legend-row{display:flex;flex-wrap:wrap;gap:10px}
.leg-item{
  display:flex;align-items:center;gap:7px;
  border-radius:999px;
  padding:7px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-size:.88rem;
}
.leg-dot{
  width:12px;height:12px;border-radius:50%;
  border:2px solid rgba(255,255,255,.4);
}
#start-btn{
  display:block;width:100%;margin-top:26px;
  border:none;border-radius:12px;
  background:linear-gradient(180deg, #e29b20 0%, #c87c00 100%);
  color:#170f05;
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:.08em;
  padding:15px;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(212,135,10,.28);
}
#start-btn:hover{filter:brightness(1.04)}

#app{
  min-height:100vh;
  display:grid;
  grid-template-columns:minmax(0,1fr) 340px;
  grid-template-rows:auto 1fr;
  grid-template-areas:
    "top top"
    "map side";
  visibility:hidden;
}
#app.visible{visibility:visible}

#topbar{
  grid-area:top;
  position:sticky;top:0;z-index:80;
  background:rgba(10,7,2,.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
#topbar h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1rem,2vw,1.22rem);
  color:var(--sand);
  letter-spacing:.05em;
  margin-right:4px;
}
#legend{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.leg{
  display:flex;align-items:center;gap:4px;
  font-size:.72rem;color:#c0a878;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.03);
}
.leg-d{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.34)}
#cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.cf{
  border-radius:999px;
  border:1px solid transparent;
  background:rgba(255,255,255,.04);
  color:#b0906a;
  font-size:.76rem;
  padding:7px 12px;
  cursor:pointer;
  min-height:38px;
}
.cf.on{font-weight:700;filter:brightness(1.45)}
#help-btn{
  border-radius:999px;
  border:1px solid rgba(200,169,110,.35);
  background:rgba(200,169,110,.12);
  color:var(--sand);
  padding:7px 12px;
  min-height:38px;
  cursor:pointer;
}

#map-panel{
  grid-area:map;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 25% 30%, rgba(212,135,10,.08), transparent 20%),
    linear-gradient(180deg, #0d0804 0%, #090603 100%);
  min-height:calc(100vh - 74px);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:12px;
}
#map-stage{
  position:relative;
  width:100%;
  max-width:1456px;
  aspect-ratio:1456 / 756;
  margin:0 auto;
}
#map-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:fill;
  display:block;
  pointer-events:none;
  border-radius:12px;
}
#map-inner{position:absolute;inset:0;pointer-events:none}
#map-inner .adot{pointer-events:auto}

.adot{
  position:absolute;
  width:16px;height:16px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.84);
  transform:translate(-50%,-50%);
  z-index:6;
  cursor:pointer;
  transition:transform .12s, box-shadow .12s, opacity .2s;
}
.adot:hover{transform:translate(-50%,-50%) scale(1.55);box-shadow:0 0 14px currentColor}
.adot.active{transform:translate(-50%,-50%) scale(1.85);outline:2px solid #fff;outline-offset:3px}
.adot.correct-dot{box-shadow:0 0 18px rgba(95,255,95,.55)}
.adot.wrong-dot{box-shadow:0 0 18px rgba(255,95,95,.45)}
.adot-label{
  position:absolute;
  top:100%;left:50%;
  transform:translate(-50%,8px);
  font-size:.78rem;
  font-weight:700;
  white-space:nowrap;
  letter-spacing:.02em;
  text-shadow:0 0 4px #000,0 0 8px #000,1px 1px 0 #000,-1px -1px 0 #000;
  pointer-events:none;
}

#sidebar{
  grid-area:side;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--panel);
  border-left:1px solid var(--line);
  min-height:calc(100vh - 74px);
}
#score-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  padding:10px 12px;
  border-bottom:1px solid rgba(200,169,110,.1);
  background:rgba(18,13,5,.98);
}
.si{font-size:.8rem;color:#9d7a56}
.si span{color:var(--sand);font-weight:700}
.btn{
  border:none;
  border-radius:10px;
  padding:8px 12px;
  min-height:40px;
  background:var(--amber);
  color:var(--deep);
  font-weight:700;
  cursor:pointer;
}
.btn.sec{
  background:transparent;
  color:var(--sand);
  border:1px solid rgba(200,169,110,.35);
}
#hint{
  min-height:42px;
  padding:9px 12px;
  color:#b49370;
  border-bottom:1px solid rgba(200,169,110,.08);
  font-size:.82rem;
  line-height:1.5;
}
#hint b{color:var(--amber)}
#wb-scroll{
  flex:1;
  overflow:auto;
  padding:12px;
}
#wb-scroll::-webkit-scrollbar{width:8px}
#wb-scroll::-webkit-scrollbar-thumb{background:rgba(200,169,110,.25);border-radius:999px}
.wb-cat-block{margin-bottom:14px}
.wb-cat-title{
  display:flex;align-items:center;gap:6px;
  font-size:.84rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:700;
  margin-bottom:8px;
}
.wb-cat-title::after{
  content:"";
  flex:1;height:1px;
  background:currentColor;opacity:.2;
}
.wb-chips{display:flex;flex-wrap:wrap;gap:7px}
.wchip,.pchip{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:38px;
  padding:7px 11px;
  border-radius:999px;
  border:1px solid;
  background:rgba(255,255,255,.05);
  cursor:pointer;
  transition:filter .12s, background .12s, opacity .12s;
  line-height:1.35;
}
.wchip{font-size:.88rem}
.wchip:hover,.pchip:hover{filter:brightness(1.2);background:rgba(255,255,255,.12)}
.wchip.sel{font-weight:700;outline:2px solid rgba(255,255,255,.5)}
.wchip.used{opacity:.2;text-decoration:line-through;pointer-events:none}

#popup{
  display:none;
  position:fixed;
  z-index:200;
  width:min(320px,calc(100vw - 24px));
  background:#1c1408;
  border:2px solid;
  border-radius:14px;
  padding:14px;
  box-shadow:0 14px 40px rgba(0,0,0,.55);
}
#popup-close{
  float:right;
  border:none;
  background:none;
  color:#999;
  font-size:1rem;
  cursor:pointer;
}
#popup-title{
  font-size:.95rem;
  font-weight:700;
  margin-bottom:10px;
  padding-right:22px;
}
#popup-chips{display:flex;flex-wrap:wrap;gap:7px}
.pchip{font-size:.88rem}
.pchip.pcurrent{outline:2px solid rgba(255,255,255,.45);font-weight:700}

#result-overlay{
  display:none;
  position:fixed;inset:0;
  z-index:300;
  background:rgba(0,0,0,.74);
  align-items:center;justify-content:center;
  padding:18px;
}
#result-overlay.show{display:flex}
#result-box{
  width:min(360px,100%);
  background:#160e04;
  border:2px solid var(--amber);
  border-radius:16px;
  padding:24px;
  text-align:center;
}
#result-box h2{color:var(--sand);margin-bottom:8px}
.rbig{font-size:2rem;color:var(--amber);font-weight:700;margin-bottom:8px}
#result-box p{color:#cfb690;line-height:1.6;margin-bottom:14px}

@media (max-width: 1100px){
  #app{
    grid-template-columns:1fr;
    grid-template-rows:auto minmax(46vh,56vh) auto;
    grid-template-areas:
      "top"
      "map"
      "side";
  }
  #map-panel{min-height:auto}
  #map-stage{max-height:min(56vh,680px)}
  #sidebar{
    min-height:auto;
    border-left:none;
    border-top:1px solid var(--line);
  }
  #cat-filter{margin-left:0}
}

@media (max-width: 720px){
  #intro{padding:14px}
  #intro-box{padding:18px}
  .step{padding:11px 12px}
  #topbar{
    padding:10px;
    gap:8px;
  }
  #topbar h1{width:100%}
  #legend{order:3;width:100%}
  #cat-filter{order:2;width:100%}
  #help-btn{order:2}
  #map-panel{padding:10px}
  #map-stage{max-height:54vh}
  .adot{
    width:18px;
    height:18px;
  }
  .adot-label{font-size:.72rem}
  #score-strip{padding:10px}
  .si{font-size:.76rem}
  .btn{flex:1}
  #score-strip > div:last-child{width:100%}
  #wb-scroll{padding:10px}
  .wchip,.pchip{font-size:.84rem;min-height:40px}
}
</style>
</head>
<body>

<div id="intro">
  <div id="intro-box">
    <h1>中東與北非地理配對遊戲</h1>
    <p class="subtitle">Middle East &amp; North Africa · Responsive Demo</p>

    <div class="intro-section">
      <h2>遊戲說明</h2>
      <div class="intro-steps">
        <div class="step"><div class="step-num">1</div><div class="step-text">地圖上有 <b>54 個彩色圓點</b>，每個代表一個地名題目。</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-text">你可以先從右側詞庫選答案，再點地圖圓點貼上。</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-text">也可以直接點圓點，從彈出的同類別選單作答。</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-text">按 <b>批改</b> 後會顯示正確與錯誤結果，可反覆修改。</div></div>
      </div>
    </div>

    <div class="intro-section">
      <h2>顏色分類</h2>
      <div class="legend-row">
        <div class="leg-item"><div class="leg-dot" style="background:#4a9eff"></div>國家（25）</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f0c040"></div>城市（10）</div>
        <div class="leg-item"><div class="leg-dot" style="background:#5ecf5e"></div>地形（8）</div>
        <div class="leg-item"><div class="leg-dot" style="background:#ff5050"></div>水域（8）</div>
        <div class="leg-item"><div class="leg-dot" style="background:#c070ff"></div>河流（3）</div>
      </div>
    </div>

    <button id="start-btn" onclick="startGame()">開始遊戲</button>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <h1>中東與北非地理配對遊戲</h1>
    <div id="legend">
      <div class="leg"><div class="leg-d" style="background:#4a9eff"></div>國家</div>
      <div class="leg"><div class="leg-d" style="background:#f0c040"></div>城市</div>
      <div class="leg"><div class="leg-d" style="background:#5ecf5e"></div>地形</div>
      <div class="leg"><div class="leg-d" style="background:#ff5050"></div>水域</div>
      <div class="leg"><div class="leg-d" style="background:#c070ff"></div>河流</div>
    </div>
    <div id="cat-filter">
      <button class="cf on" data-cat="全部" style="border-color:rgba(200,169,110,.35);color:#c8a96e">全部</button>
      <button class="cf" data-cat="國家" style="border-color:#4a9eff66;color:#4a9eff">國家</button>
      <button class="cf" data-cat="城市" style="border-color:#f0c04066;color:#f0c040">城市</button>
      <button class="cf" data-cat="地形" style="border-color:#5ecf5e66;color:#5ecf5e">地形</button>
      <button class="cf" data-cat="水域" style="border-color:#ff505066;color:#ff5050">水域</button>
      <button class="cf" data-cat="河流" style="border-color:#c070ff66;color:#c070ff">河流</button>
    </div>
    <button id="help-btn" onclick="showIntro()">說明</button>
  </div>

  <div id="map-panel">
    <div id="map-stage">
      <img id="map-img" alt="map" draggable="false"
        src="./Gemini_Generated_Image_hyce42hyce42hyce.png">
      <div id="map-inner"></div>
    </div>
  </div>

  <div id="sidebar">
    <div id="score-strip">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="si">已答 <span id="s-done">0</span></div>
        <div class="si">正確 <span id="s-ok">0</span></div>
        <div class="si">錯誤 <span id="s-bad">0</span></div>
        <div class="si">未答 <span id="s-empty">0</span></div>
        <div class="si">共 <span id="s-tot">54</span></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn" onclick="checkAll()">批改</button>
        <button class="btn sec" onclick="resetAll()">重置</button>
      </div>
    </div>
    <div id="hint"></div>
    <div id="wb-scroll"><div id="wb"></div></div>
  </div>
</div>

<div id="popup">
  <button id="popup-close" onclick="closePopup()">✕</button>
  <div id="popup-title"></div>
  <div id="popup-chips"></div>
</div>

<div id="result-overlay">
  <div id="result-box">
    <h2>遊戲結束</h2>
    <div class="rbig" id="r-score"></div>
    <p id="r-msg"></p>
    <button class="btn" onclick="document.getElementById('result-overlay').classList.remove('show')">繼續作答</button>
    <br>
    <button class="btn sec" style="margin-top:8px" onclick="resetAll()">重新作答</button>
  </div>
</div>

  {label:"撒哈拉沙漠",cat:"地形",color:"#5ecf5e",mx:20.34,my:51.65},
  {label:"亞特拉斯山脈",cat:"地形",color:"#5ecf5e",mx:19.4,my:29.31},
  {label:"高加索山",cat:"地形",color:"#5ecf5e",mx:65.19,my:15.15},
  {label:"阿拉伯海",cat:"水域",color:"#ff5050",mx:86.48,my:79.7},
  {label:"波斯灣",cat:"水域",color:"#ff5050",mx:72.74,my:55.73},
  {label:"亞丁灣",cat:"水域",color:"#ff5050",mx:64.92,my:84.88},
  {label:"紅海",cat:"水域",color:"#ff5050",mx:56.84,my:67.72},
  {label:"地中海",cat:"水域",color:"#ff5050",mx:36.1,my:30.67},
  {label:"大西洋",cat:"水域",color:"#ff5050",mx:5.39,my:30.4},
  {label:"黑海",cat:"水域",color:"#ff5050",mx:56.3,my:9.7},
  {label:"裏海",cat:"水域",color:"#ff5050",mx:70.85,my:17.87},
  {label:"底格里斯河",cat:"河流",color:"#c070ff",mx:61.75,my:29.46},
  {label:"幼發拉底河",cat:"河流",color:"#c070ff",mx:58.74,my:30.22},
  {label:"尼羅河",cat:"河流",color:"#c070ff",mx:48.82,my:48.4}
];

const CATS = {
  "國家":["土耳其","賽普勒斯","敘利亞","黎巴嫩","以色列","約旦","伊拉克","伊朗","沙烏地阿拉伯","科威特","卡達","巴林","阿拉伯聯合大公國","阿曼","葉門","喬治亞","亞美尼亞","亞塞拜然","埃及","利比亞","突尼西亞","阿爾及利亞","摩洛哥","蘇丹","阿富汗"],
  "城市":["耶路撒冷","巴格達","德黑蘭","利雅德","杜拜","安卡拉","伊斯坦堡","大馬士革","開羅","卡薩布蘭卡"],
  "地形":["伊朗高原","安納托利亞高原","阿拉伯高原","美索不達米亞平原","阿富汗高原","撒哈拉沙漠","亞特拉斯山脈","高加索山"],
  "水域":["地中海","黑海","裏海","紅海","阿拉伯海","大西洋","亞丁灣","波斯灣"],
  "河流":["底格里斯河","幼發拉底河","尼羅河"]
};

const CAT_COLOR = {"國家":"#4a9eff","城市":"#f0c040","地形":"#5ecf5e","水域":"#ff5050","河流":"#c070ff"};
const CAT_ORDER = ["國家","城市","地形","水域","河流"];

let answers = {};
let selChip = null;
let activeDot = null;
let currentCat = "全部";
let gameStarted = false;

function startGame(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("app").classList.add("visible");
  if (!gameStarted){
    gameStarted = true;
    const img = document.getElementById("map-img");
    const init = ()=>{
      renderDots();
      buildWordBank();
      updateHint();
    };
    if (img.complete && img.naturalWidth) init();
    else img.addEventListener("load", init, {once:true});
    document.querySelectorAll(".cf").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        document.querySelectorAll(".cf").forEach(x=>x.classList.remove("on"));
        btn.classList.add("on");
        currentCat = btn.dataset.cat;
        buildWordBank();
        filterDots();
      });
    });
    document.addEventListener("click", e=>{
      if(!e.target.closest("#popup") && !e.target.closest(".adot") && !e.target.closest(".wchip")){
        closePopup();
      }
    });
  }
}

function showIntro(){
  document.getElementById("intro").style.display = "flex";
}

function renderDots(){
  const inner = document.getElementById("map-inner");
  inner.innerHTML = "";
  ITEMS.forEach(item=>{
    const dot = document.createElement("div");
    dot.className = "adot";
    dot.dataset.label = item.label;
    dot.style.background = item.color;
    dot.style.boxShadow = "0 0 6px " + item.color + "88";
    dot.addEventListener("click", e=>{
      e.stopPropagation();
      onDotClick(item.label, dot, e);
    });
    inner.appendChild(dot);
  });
  repositionDots();
}

function repositionDots(){
  ITEMS.forEach(item=>{
    const dot = document.querySelector('.adot[data-label="' + item.label + '"]');
    if(!dot) return;
    dot.style.left = item.mx + "%";
    dot.style.top  = item.my + "%";
  });
}

function filterDots(){
  ITEMS.forEach(item=>{
    const dot = document.querySelector('.adot[data-label="' + item.label + '"]');
    if(!dot) return;
    const show = currentCat === "全部" || item.cat === currentCat;
    dot.style.opacity = show ? "1" : ".08";
  });
}

function buildWordBank(){
  const wb = document.getElementById("wb");
  wb.innerHTML = "";
  const usedVals = new Set(Object.values(answers));
  const catsToShow = currentCat === "全部" ? CAT_ORDER : [currentCat];

  catsToShow.forEach(cat=>{
    const labels = CATS[cat] || [];
    const block = document.createElement("div");
    block.className = "wb-cat-block";

    const title = document.createElement("div");
    title.className = "wb-cat-title";
    title.style.color = CAT_COLOR[cat];
    title.textContent = cat + "（" + labels.length + "）";
    block.appendChild(title);

    const chips = document.createElement("div");
    chips.className = "wb-chips";

    [...labels].sort(()=>Math.random()-.5).forEach(label=>{
      const chip = document.createElement("span");
      chip.className = "wchip" + (usedVals.has(label) ? " used" : "");
      chip.dataset.value = label;
      chip.textContent = label;
      chip.style.color = CAT_COLOR[cat];
      chip.style.borderColor = CAT_COLOR[cat] + "66";
      chip.style.background = CAT_COLOR[cat] + "14";
      chip.addEventListener("click", e=>{
        e.stopPropagation();
        onChipClick(chip);
      });
      chips.appendChild(chip);
    });

    block.appendChild(chips);
    wb.appendChild(block);
  });
}

function onChipClick(chip){
  if(chip.classList.contains("used")) return;
  if(selChip === chip){
    clearSel();
    updateHint();
    return;
  }
  if(selChip) selChip.classList.remove("sel");
  selChip = chip;
  chip.classList.add("sel");
  updateHint();
  if(activeDot){
    assignAnswer(activeDot.dataset.label, chip.dataset.value);
    clearSel();
    clearActive();
  }
}

function onDotClick(label, dot, e){
  if(selChip){
    assignAnswer(label, selChip.dataset.value);
    clearSel();
    clearActive();
    updateHint();
    return;
  }
  setActive(dot);
  openPopup(label, e);
}

function setActive(dot){
  clearActive();
  activeDot = dot;
  dot.classList.add("active");
}

function clearActive(){
  if(activeDot){
    activeDot.classList.remove("active");
    activeDot = null;
  }
}

function clearSel(){
  if(selChip){
    selChip.classList.remove("sel");
    selChip = null;
  }
}

function updateHint(){
  document.getElementById("hint").innerHTML = selChip
    ? '已選「<b>' + selChip.dataset.value + '</b>」, 點地圖圓點即可填入。'
    : "可先從詞庫選答案，也可以直接點地圖圓點作答。";
}

function openPopup(label, e){
  const popup = document.getElementById("popup");
  const title = document.getElementById("popup-title");
  const chips = document.getElementById("popup-chips");
  const item = ITEMS.find(i=>i.label === label);
  const usedVals = new Set(Object.values(answers));
  const current = answers[label];

  popup.style.display = "block";
  popup.style.borderColor = item.color;
  title.style.color = item.color;
  title.textContent = "選擇答案（" + item.cat + "）";
  chips.innerHTML = "";

  (CATS[item.cat] || []).forEach(l=>{
    if(usedVals.has(l) && l !== current) return;
    const c = document.createElement("span");
    c.className = "pchip" + (current === l ? " pcurrent" : "");
    c.textContent = l;
    c.style.color = item.color;
    c.style.borderColor = item.color + "66";
    c.addEventListener("click", ()=>{
      assignAnswer(label, l);
      closePopup();
      clearActive();
    });
    chips.appendChild(c);
  });

  let left = e.clientX + 12;
  let top = e.clientY + 12;
  if(left + 320 > window.innerWidth) left = window.innerWidth - 332;
  if(top + 280 > window.innerHeight) top = window.innerHeight - 292;
  popup.style.left = Math.max(12, left) + "px";
  popup.style.top = Math.max(12, top) + "px";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
  clearActive();
}

function assignAnswer(label, value){
  Object.keys(answers).forEach(k=>{
    if(answers[k] === value && k !== label) delete answers[k];
  });
  answers[label] = value;
  const dot = document.querySelector('.adot[data-label="' + label + '"]');
  if(dot){
    dot.classList.remove("correct-dot", "wrong-dot");
    let lbl = dot.querySelector(".adot-label");
    if(!lbl){
      lbl = document.createElement("div");
      lbl.className = "adot-label";
      dot.appendChild(lbl);
    }
    lbl.textContent = value;
    lbl.style.color = dot.style.background;
  }
  refreshChips();
  document.getElementById("s-done").textContent = Object.keys(answers).length;
}

function refreshChips(){
  const usedVals = new Set(Object.values(answers));
  document.querySelectorAll(".wchip").forEach(chip=>{
    chip.classList.toggle("used", usedVals.has(chip.dataset.value));
    if(chip.classList.contains("sel") && usedVals.has(chip.dataset.value)){
      chip.classList.remove("sel");
      selChip = null;
    }
  });
  updateHint();
}

function checkAll(){
  let ok = 0, bad = 0, empty = 0;
  ITEMS.forEach(item=>{
    const dot = document.querySelector('.adot[data-label="' + item.label + '"]');
    const lbl = dot.querySelector(".adot-label");
    const val = answers[item.label] || "";
    dot.classList.remove("correct-dot", "wrong-dot");
    if(!val){
      empty++;
      if(lbl) lbl.style.color = dot.style.background;
    }else if(val === item.label){
      ok++;
      dot.classList.add("correct-dot");
      if(lbl) lbl.style.color = "#afffaf";
    }else{
      bad++;
      dot.classList.add("wrong-dot");
      if(lbl) lbl.style.color = "#ffaaaa";
    }
  });
  document.getElementById("s-ok").textContent = ok;
  document.getElementById("s-bad").textContent = bad;
  document.getElementById("s-empty").textContent = empty;
  if(ok === ITEMS.length) showResult(ok, ITEMS.length);
}

function showResult(ok, tot){
  const pct = Math.round(ok / tot * 100);
  document.getElementById("r-score").textContent = ok + " / " + tot + " (" + pct + "%)";
  document.getElementById("r-msg").textContent =
    pct === 100 ? "完美，全部答對了。"
    : pct >= 80 ? "很棒，已經非常接近滿分。"
    : pct >= 60 ? "表現不錯，再修幾題就更完整了。"
    : "先熟悉位置沒關係，這版可以很舒服地慢慢練。";
  document.getElementById("result-overlay").classList.add("show");
}

function resetAll(){
  answers = {};
  document.querySelectorAll(".adot").forEach(dot=>{
    dot.classList.remove("active", "correct-dot", "wrong-dot");
    const lbl = dot.querySelector(".adot-label");
    if(lbl) lbl.remove();
  });
  ["s-done","s-ok","s-bad","s-empty"].forEach(id=>{
    document.getElementById(id).textContent = "0";
  });
  document.getElementById("result-overlay").classList.remove("show");
  clearSel();
  clearActive();
  closePopup();
  buildWordBank();
  updateHint();
}
</script>
</body>
</html>
